{% extends "layout.html" %}
{% block title %}{{ _('Forgot Password') }}{% endblock %}

{% block main %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md animate-slide-up">
        <div class="bg-charcoal-700 border border-charcoal-600 rounded-2xl shadow-2xl overflow-hidden">
            <div class="px-8 pt-8 pb-6 border-b border-charcoal-600">
                <p class="text-xs text-gold tracking-[0.25em] uppercase mb-2">FM Residences</p>
                <h2 class="font-display text-3xl text-cream">{{ _('Reset Password') }}</h2>
                <p class="text-cream/40 text-sm mt-1">{{ _("We'll send a reset link to your email") }}</p>
            </div>
            <div class="px-8 py-7">
                <div id="fp-error"   class="hidden mb-4 px-4 py-3 bg-red-900/30 border border-red-700/50 text-red-400 rounded-xl text-sm"></div>
                <div id="fp-success" class="hidden mb-4 px-4 py-3 bg-green-900/30 border border-green-700/50 text-green-400 rounded-xl text-sm"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-cream/50 uppercase tracking-wider mb-1.5">{{ _('Email Address') }}</label>
                        <input id="email" type="email" autocomplete="email" autofocus
                               class="w-full bg-charcoal-600 border border-charcoal-500 text-cream placeholder-cream/30 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold transition-colors"
                               placeholder="{{ _('your@email.com') }}">
                    </div>
                </div>
                <button id="fp-btn"
                        class="mt-6 w-full py-3 bg-gold hover:bg-gold-light text-charcoal font-semibold rounded-xl transition-colors text-sm tracking-wide uppercase">
                    {{ _('Send Reset Link') }}
                </button>
                <p class="mt-5 text-center text-sm text-cream/40">
                    {{ _('Remembered it?') }}
                    <a href="{{ url_for('auth.login_page') }}" class="text-gold hover:text-gold-light transition-colors">{{ _('Sign in →') }}</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
const I18N = {
    enterEmail:    {{ _('Please enter your email.')                              | tojson }},
    sending:       {{ _('Sending…')                                              | tojson }},
    linkSent:      {{ _('If that email exists, a reset link has been sent.')     | tojson }},
    emailSent:     {{ _('Email Sent')                                            | tojson }},
    failed:        {{ _('Failed. Please try again.')                             | tojson }},
    networkError:  {{ _('Network error. Please try again.')                      | tojson }},
    sendResetLink: {{ _('Send Reset Link')                                       | tojson }},
};

const btn     = document.getElementById('fp-btn');
const errBox  = document.getElementById('fp-error');
const succBox = document.getElementById('fp-success');

btn.addEventListener('click', async () => {
    errBox.classList.add('hidden');
    const email = document.getElementById('email').value.trim();
    if (!email) { errBox.textContent=I18N.enterEmail; errBox.classList.remove('hidden'); return; }
    btn.disabled=true; btn.textContent=I18N.sending;
    try {
        const res  = await fetch('/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email}) });
        const data = await res.json();
        if (!res.ok) { errBox.textContent = data.error || I18N.failed; errBox.classList.remove('hidden'); }
        else { succBox.textContent = I18N.linkSent; succBox.classList.remove('hidden'); btn.textContent=I18N.emailSent; return; }
    } catch { errBox.textContent=I18N.networkError; errBox.classList.remove('hidden'); }
    btn.disabled=false; btn.textContent=I18N.sendResetLink;
});
document.addEventListener('keydown', e => { if (e.key==='Enter') btn.click(); });
</script>
{% endblock %}
