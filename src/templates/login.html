{% extends "layout.html" %}
{% block title %}Sign In{% endblock %}

{% block main %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md animate-slide-up">

        <!-- Card -->
        <div class="bg-charcoal-700 border border-charcoal-600 rounded-2xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="px-8 pt-8 pb-6 border-b border-charcoal-600">
                <p class="text-xs text-gold tracking-[0.25em] uppercase mb-2">FM Residences</p>
                <h2 class="font-display text-3xl text-cream">Welcome back</h2>
                <p class="text-cream/40 text-sm mt-1">Sign in to manage your reservations</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-7">
                <div id="login-error" class="hidden mb-5 px-4 py-3 bg-red-900/30 border border-red-700/50 text-red-400 rounded-xl text-sm"></div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-cream/50 uppercase tracking-wider mb-1.5">Username</label>
                        <input id="username" type="text" autocomplete="username" autofocus
                               class="w-full bg-charcoal-600 border border-charcoal-500 text-cream placeholder-cream/30 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold transition-colors"
                               placeholder="Your username">
                    </div>
                    <div>
                        <label class="block text-xs text-cream/50 uppercase tracking-wider mb-1.5">Password</label>
                        <input id="password" type="password" autocomplete="current-password"
                               class="w-full bg-charcoal-600 border border-charcoal-500 text-cream placeholder-cream/30 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold transition-colors"
                               placeholder="Your password">
                    </div>
                </div>

                <button id="login-btn"
                        class="mt-6 w-full py-3 bg-gold hover:bg-gold-light text-charcoal font-semibold rounded-xl transition-colors text-sm tracking-wide uppercase">
                    Sign In
                </button>

                <div class="mt-5 flex justify-between text-sm text-cream/40">
                    <a href="{{ url_for('auth.forgot_password_page') }}" class="hover:text-gold transition-colors">Forgot password?</a>
                    <a href="{{ url_for('auth.register_page') }}" class="hover:text-gold transition-colors">Create account →</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const btn      = document.getElementById('login-btn');
const errorBox = document.getElementById('login-error');
const next     = new URLSearchParams(window.location.search).get('next') || '/';

function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); }

async function doLogin() {
    errorBox.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Signing in…';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('Please enter your username and password.'); btn.disabled=false; btn.textContent='Sign In'; return; }

    try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
        const res  = await fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Login failed.'); btn.disabled=false; btn.textContent='Sign In'; return; }
        sessionStorage.setItem('access_token',  data.access_token);
        sessionStorage.setItem('refresh_token', data.refresh_token);
        window.location.href = next;
    } catch { showError('Network error. Please try again.'); btn.disabled=false; btn.textContent='Sign In'; }
}

btn.addEventListener('click', doLogin);
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
{% endblock %}
